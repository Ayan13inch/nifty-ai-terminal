<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N50 NEXUS — Nifty 50 Live Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #020508;
      --glass: rgba(15, 25, 45, 0.85);
      --accent: #00d4ff;
      --green: #00ff88;
      --red: #ff3366;
    }
    body {
      background: var(--bg);
      color: #c8dde8;
      font-family: 'Share Tech Mono', monospace;
      margin: 0;
      padding: 0;
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 12px;
    }

    header {
      padding: 20px 15px;
      background: rgba(5,10,25,0.95);
      border-bottom: 1px solid var(--accent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 4px;
    }

    .top5-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      padding: 20px 15px;
    }
    .stock-card {
      padding: 18px;
      border-radius: 12px;
      transition: 0.3s;
    }
    .stock-card:hover { transform: translateY(-8px); }

    .portfolio-engine {
      margin: 20px 15px;
      padding: 30px 20px;
      text-align: center;
    }

    .budget-input {
      font-size: 32px;
      width: 100%;
      max-width: 380px;
      background: transparent;
      border: 2px solid var(--accent);
      color: white;
      text-align: center;
      padding: 12px;
      border-radius: 8px;
    }

    .analyze-btn {
      margin-top: 20px;
      padding: 16px 50px;
      background: linear-gradient(#00ff88, #00cc66);
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--glass);
    }
    th, td {
      padding: 12px 10px;
      text-align: left;
    }
    th { background: #0a1328; color: var(--accent); }

    footer {
      text-align: center;
      padding: 25px;
      color: #555;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">N50 NEXUS</div>
  <div style="color:var(--green)">● LIVE</div>
</header>

<div style="max-width:1400px; margin:0 auto; padding:15px;">

  <!-- Top Signals -->
  <div style="margin-bottom:30px">
    <h2 style="color:var(--accent); margin-bottom:15px;">TOP SIGNALS</h2>
    <div class="top5-grid" id="top5Grid"></div>
  </div>

  <!-- Portfolio Engine -->
  <div class="glass portfolio-engine">
    <h2 style="margin-bottom:10px;">Portfolio Engine</h2>
    <input type="number" id="budgetInput" class="budget-input" placeholder="50000" />
    <br>
    <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">
      ANALYZE & BUILD PORTFOLIO
    </button>
  </div>

  <!-- Portfolio Results -->
  <div class="glass portfolio-section" id="portfolioSection" style="margin:20px 15px; padding:25px; display:none;">
    <h2 style="color:var(--accent)">Recommended Portfolio</h2>
    <div id="portSummary" style="margin:20px 0;"></div>
    <div id="portfolioRows"></div>
  </div>

  <!-- Live Table -->
  <div>
    <h2 style="color:var(--accent); margin:20px 0 15px;">NIFTY 50 LIVE SCAN</h2>
    <div class="glass" style="overflow-x:auto;">
      <table id="stocksTable">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Price</th>
            <th>Change</th>
            <th>RSI</th>
            <th>Score</th>
            <th>Signal</th>
          </tr>
        </thead>
        <tbody id="stocksTbody"></tbody>
      </table>
    </div>
  </div>

</div>

<footer>
  ⚠ For Educational Purposes Only • Not Financial Advice<br><br>
  Created by <strong>Ayan Bhowmick</strong><br>
  <a href="mailto:ayaandeep9051@gmail.com" style="color:var(--accent)">ayaandeep9051@gmail.com</a>
</footer>

<script src="app.js"></script>
</body>
</html>
