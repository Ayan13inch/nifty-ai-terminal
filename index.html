<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N50 NEXUS — Nifty 50 Live Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #02050a;
      --glass: rgba(10, 20, 40, 0.75);
      --glass-border: rgba(0, 212, 255, 0.3);
      --green: #00ff88;
      --cyan: #00f0ff;
      --red: #ff3366;
      --yellow: #ffd700;
      --text: #e0f0ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background-image: 
        linear-gradient(rgba(0,240,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 25s linear infinite;
    }

    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 50px 50px; }
    }

    .scanlines {
      position: fixed; inset: 0; z-index: 1;
      background: repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(0,255,255,0.06) 4px, rgba(0,255,255,0.06) 6px);
      pointer-events: none;
      animation: scan 4s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
    }

    .header {
      padding: 30px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      border-bottom: 1px solid rgba(0,212,255,0.2);
    }
    .logo-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(28px, 8vw, 48px);
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(90deg, #00f0ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Top 5 Cards */
    .top5-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      padding: 20px;
    }
    .stock-card {
      padding: 20px;
      border-radius: 18px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: cardPop 0.6s ease backwards;
    }
    .stock-card:hover {
      transform: translateY(-12px) scale(1.04);
      box-shadow: 0 0 35px rgba(0, 240, 255, 0.5);
    }

    @keyframes cardPop {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Budget Section */
    .budget-section {
      margin: 20px;
      padding: 40px 20px;
      text-align: center;
    }

    .budget-input {
      background: transparent;
      border: 2px solid var(--cyan);
      color: white;
      font-size: 28px;
      text-align: center;
      padding: 15px;
      border-radius: 12px;
      width: 100%;
      max-width: 320px;
    }

    .analyze-btn {
      margin-top: 20px;
      padding: 18px 50px;
      font-size: 16px;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--green), var(--cyan));
      color: #000;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .analyze-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 40px rgba(0,255,136,0.7);
    }

    /* Portfolio */
    .portfolio-section {
      display: none;
      margin: 20px;
      padding: 30px 20px;
    }
    .portfolio-section.visible { display: block; }

    .port-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 18px;
      margin-bottom: 12px;
      border-radius: 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
    }

    /* Table */
    .table-wrap {
      margin: 20px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
    }
    .stocks-table {
      width: 100%;
      border-collapse: collapse;
    }
    .stocks-table th, .stocks-table td {
      padding: 12px 10px;
      text-align: left;
    }
    .stocks-table th {
      background: rgba(0,30,60,0.9);
      font-size: 10px;
      letter-spacing: 1.5px;
    }

    footer {
      text-align: center;
      padding: 25px 20px;
      font-size: 11px;
      color: var(--text-dim);
      border-top: 1px solid rgba(0,212,255,0.15);
    }

    /* Responsive Improvements */
    @media (max-width: 768px) {
      .top5-grid { grid-template-columns: 1fr 1fr; }
      .port-row { grid-template-columns: 1fr; }
      .header { padding: 20px 15px; }
    }
  </style>
</head>
<body>

<div class="scanlines"></div>

<div class="header glass">
  <div>
    <div class="logo-name">N50 NEXUS</div>
    <div style="font-size:13px; color:var(--green); letter-spacing:2px;">QUANTUM MARKET TERMINAL</div>
  </div>
  <div style="color:var(--green); font-size:15px; font-weight:bold;">● LIVE</div>
</div>

<!-- Top Signals -->
<section style="padding:20px;">
  <div style="margin-bottom:15px; font-size:15px; letter-spacing:3px; color:var(--cyan); text-align:center;">TOP SIGNALS</div>
  <div class="top5-grid" id="top5Grid"></div>
</section>

<!-- Portfolio Engine -->
<div class="budget-section glass">
  <div style="font-size:17px; margin-bottom:25px; color:var(--green);">PORTFOLIO OPTIMIZER</div>
  <input type="number" class="budget-input glass" id="budgetInput" placeholder="50000" />
  <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">DEPLOY PORTFOLIO</button>
  
  <div style="margin-top:20px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
    <button onclick="setPreset(25000)" style="padding:8px 16px; background:rgba(0,255,136,0.1); border:1px solid var(--green); color:var(--green); border-radius:30px;">25K</button>
    <button onclick="setPreset(50000)" style="padding:8px 16px; background:rgba(0,255,136,0.1); border:1px solid var(--green); color:var(--green); border-radius:30px;">50K</button>
    <button onclick="setPreset(100000)" style="padding:8px 16px; background:rgba(0,255,136,0.1); border:1px solid var(--green); color:var(--green); border-radius:30px;">1L</button>
  </div>
</div>

<!-- Portfolio Results -->
<div class="portfolio-section glass" id="portfolioSection">
  <div style="font-size:18px; color:var(--cyan); margin-bottom:20px;">RECOMMENDED DEPLOYMENT</div>
  <div id="portSummary" style="display:flex; flex-wrap:wrap; gap:20px; margin-bottom:25px;"></div>
  <div id="portfolioRows"></div>
</div>

<!-- Live Scan -->
<div style="padding:0 20px 30px;">
  <div style="font-size:15px; letter-spacing:3px; color:var(--cyan); margin-bottom:15px; text-align:center;">NIFTY 50 LIVE SCAN</div>
  <div class="table-wrap glass">
    <table class="stocks-table" id="stocksTable">
      <thead>
        <tr>
          <th>SYMBOL</th>
          <th>LTP</th>
          <th>CHG%</th>
          <th>RSI</th>
          <th>SCORE</th>
          <th>SIGNAL</th>
        </tr>
      </thead>
      <tbody id="stocksTbody"></tbody>
    </table>
  </div>
</div>

<footer>
  <div>⚠ EDUCATIONAL PURPOSES ONLY • NOT FINANCIAL ADVICE</div>
  <div>
    Created by <strong>Ayan Bhowmick</strong><br>
    <a href="mailto:ayaandeep9051@gmail.com" style="color:var(--cyan);">ayaandeep9051@gmail.com</a>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
