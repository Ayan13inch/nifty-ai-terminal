<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N50 NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg: #0a0a0f;
      --card: rgba(20, 25, 45, 0.95);
      --accent: #00ffff;
      --green: #39ff14;
      --red: #ff00aa;
    }
    body {
      background: var(--bg);
      color: #00ffcc;
      font-family: 'VT323', monospace;
      margin: 0;
      padding: 0;
      line-height: 1.4;
    }

    .glass {
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }

    header {
      padding: 15px 20px;
      background: rgba(10,10,20,0.98);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--accent);
    }
    .logo {
      font-family: 'Press Start 2P', cursive;
      font-size: 24px;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent);
    }

    .section { padding: 25px 20px; }
    .title {
      font-family: 'Press Start 2P', cursive;
      color: var(--accent);
      font-size: 16px;
      margin-bottom: 15px;
      text-shadow: 0 0 8px var(--accent);
    }

    .top5-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .stock-card {
      padding: 18px;
      transition: all 0.3s;
      cursor: pointer;
    }
    .stock-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0,255,255,0.5);
    }

    .budget-input {
      font-family: 'VT323', monospace;
      font-size: 38px;
      background: transparent;
      border: 3px solid var(--accent);
      color: #fff;
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      transition: all 0.3s;
    }
    .budget-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 20px var(--green);
      transform: scale(1.03);
    }

    .analyze-btn {
      margin-top: 20px;
      padding: 16px 40px;
      background: linear-gradient(45deg, #39ff14, #00ffff);
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.4s;
    }
    .analyze-btn:hover {
      transform: scale(1.1) rotate(2deg);
      box-shadow: 0 0 30px #39ff14;
    }

    .sparkline { height: 60px; }

    .port-row {
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      background: rgba(0,255,200,0.05);
      border-left: 4px solid var(--green);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
    }
    th, td {
      padding: 14px 10px;
      border-bottom: 1px solid #1a2a3a;
    }
    th { color: var(--accent); }

    footer {
      text-align: center;
      padding: 30px;
      color: #555;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">N50 NEXUS</div>
  <div style="color:#39ff14; font-size:18px;">● LIVE</div>
</header>

<div class="section">
  <div class="title">TOP SIGNALS</div>
  <div class="top5-grid" id="top5Grid"></div>
</div>

<div class="section glass">
  <div class="title">PORTFOLIO ENGINE</div>
  <input type="number" id="budgetInput" class="budget-input glass" placeholder="ENTER BUDGET">
  <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">ANALYZE & BUILD</button>
</div>

<div class="portfolio-section glass section" id="portfolioSection" style="display:none;">
  <div class="title">RECOMMENDED PORTFOLIO</div>
  <div id="portSummary" style="margin:15px 0; font-size:18px;"></div>
  <div id="portfolioRows"></div>
</div>

<div class="section">
  <div class="title">LIVE MARKET SCAN</div>
  <div class="glass" style="overflow-x:auto; padding:10px;">
    <table id="stocksTable">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Price</th>
          <th>Change</th>
          <th>RSI</th>
          <th>Score</th>
          <th>Signal</th>
          <th>Trend</th>
        </tr>
      </thead>
      <tbody id="stocksTbody"></tbody>
    </table>
  </div>
</div>

<footer>
  Educational Purposes Only • Not Financial Advice<br><br>
  Created by <strong>Ayan Bhowmick</strong><br>
  <a href="mailto:ayaandeep9051@gmail.com" style="color:var(--accent)">ayaandeep9051@gmail.com</a>
</footer>

<script src="app.js"></script>
</body>
</html>
