<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N50 NEXUS — Nifty 50 Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #05070f;
      --card: #0f1626;
      --accent: #00d4ff;
      --green: #00ff88;
      --red: #ff3366;
    }
    body {
      background: var(--bg);
      color: #ddd;
      font-family: 'Share Tech Mono', monospace;
      margin: 0;
      padding: 0;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 15px; }

    header {
      background: rgba(10,15,35,0.9);
      padding: 20px 0;
      border-bottom: 1px solid var(--accent);
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      color: var(--accent);
    }

    .section { margin: 40px 0; }
    .section-title {
      font-family: 'Orbitron', sans-serif;
      color: var(--accent);
      margin-bottom: 20px;
      font-size: 18px;
    }

    .top5-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .stock-card {
      background: var(--card);
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #1e2a4d;
    }

    .portfolio-engine {
      background: var(--card);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid var(--accent);
    }
    .budget-input {
      font-size: 32px;
      background: transparent;
      border: 2px solid var(--accent);
      color: white;
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      max-width: 350px;
    }
    .analyze-btn {
      margin-top: 20px;
      padding: 16px 40px;
      background: var(--green);
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .portfolio-section { display: none; }
    .portfolio-section.visible { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #1e2a4d;
    }
    th { background: #0a0f1f; color: var(--accent); }

    footer {
      text-align: center;
      padding: 30px;
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
    <div class="logo">N50 NEXUS</div>
    <div style="color:var(--green);">● LIVE MARKET</div>
  </div>
</header>

<div class="container">

  <!-- Top Signals -->
  <div class="section">
    <div class="section-title">TOP SIGNALS TODAY</div>
    <div class="top5-grid" id="top5Grid"></div>
  </div>

  <!-- Portfolio Engine -->
  <div class="section portfolio-engine">
    <h2 style="margin-bottom:10px;">Portfolio Engine</h2>
    <p style="margin-bottom:20px; color:#aaa;">Enter Budget (₹)</p>
    <input type="number" id="budgetInput" class="budget-input" placeholder="50000" />
    <br>
    <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">
      ANALYZE & BUILD PORTFOLIO
    </button>
  </div>

  <!-- Portfolio Results -->
  <div class="section portfolio-section" id="portfolioSection">
    <div class="section-title">RECOMMENDED PORTFOLIO</div>
    <div id="portSummary" style="display:flex; gap:30px; flex-wrap:wrap; margin-bottom:20px;"></div>
    <div id="portfolioRows"></div>
  </div>

  <!-- Full Table -->
  <div class="section">
    <div class="section-title">NIFTY 50 LIVE SCAN</div>
    <table id="stocksTable">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Price</th>
          <th>Change %</th>
          <th>RSI</th>
          <th>Score</th>
          <th>Signal</th>
        </tr>
      </thead>
      <tbody id="stocksTbody"></tbody>
    </table>
  </div>

</div>

<footer>
  <div>⚠ Educational Purposes Only • Not Financial Advice</div>
  <div>Created by <strong>Ayan Bhowmick</strong> • 
    <a href="mailto:ayaandeep9051@gmail.com" style="color:var(--accent)">ayaandeep9051@gmail.com</a>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
