<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N50 NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f0f12;
      --card: rgba(30, 32, 40, 0.95);
      --accent: #00f0ff;
      --green: #00ff9d;
      --red: #ff3b5c;
    }
    body {
      background: var(--bg);
      color: #f0f2f5;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    .glass {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 240, 255, 0.15);
    }

    header {
      padding: 18px 20px;
      background: rgba(15,15,20,0.98);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .section { padding: 24px 20px; }

    .title {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .top5-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .stock-card {
      padding: 20px;
      border-radius: 18px;
      transition: all 0.3s ease;
    }
    .stock-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 35px rgba(0, 240, 255, 0.2);
    }

    .portfolio-engine {
      text-align: center;
      padding: 40px 20px;
    }
    .budget-input {
      font-size: 42px;
      font-weight: 500;
      background: transparent;
      border: none;
      color: white;
      text-align: center;
      width: 100%;
      max-width: 320px;
      margin: 10px auto;
      border-bottom: 3px solid var(--accent);
      outline: none;
    }

    .analyze-btn {
      margin-top: 25px;
      padding: 16px 48px;
      background: linear-gradient(90deg, #00ff9d, #00d4ff);
      color: black;
      font-weight: 600;
      border: none;
      border-radius: 9999px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0, 255, 157, 0.3);
    }

    .portfolio-section {
      display: none;
      padding: 20px;
    }
    .portfolio-section.visible { display: block; }

    .port-row {
      background: rgba(40,42,55,0.6);
      padding: 16px 20px;
      border-radius: 16px;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
    }
    th, td {
      padding: 16px 12px;
      text-align: left;
    }
    th { background: #1a1c24; color: var(--accent); }

    footer {
      text-align: center;
      padding: 40px 20px 30px;
      color: #64748b;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">N50 NEXUS</div>
  <div style="color:#00ff9d">● LIVE</div>
</header>

<div class="section">
  <div class="title">Top Signals</div>
  <div class="top5-grid" id="top5Grid"></div>
</div>

<div class="section portfolio-engine glass">
  <div class="title">Portfolio Engine</div>
  <input type="number" id="budgetInput" class="budget-input" placeholder="Enter Amount">
  <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">
    ANALYZE & BUILD PORTFOLIO
  </button>
</div>

<div class="portfolio-section glass" id="portfolioSection">
  <div class="title">Recommended Portfolio</div>
  <div id="portSummary" style="margin:20px 0; font-size:16px; line-height:1.8;"></div>
  <div id="portfolioRows"></div>
</div>

<div class="section">
  <div class="title">Live Market Scan</div>
  <div class="glass" style="overflow-x:auto">
    <table id="stocksTable">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Price</th>
          <th>Change</th>
          <th>Score</th>
          <th>Signal</th>
        </tr>
      </thead>
      <tbody id="stocksTbody"></tbody>
    </table>
  </div>
</div>

<footer>
  Educational Purposes Only • Not Financial Advice<br><br>
  Created by <strong>Ayan Bhowmick</strong><br>
  <a href="mailto:ayaandeep9051@gmail.com" style="color:var(--accent)">ayaandeep9051@gmail.com</a>
</footer>

<script src="app.js"></script>
</body>
</html>
