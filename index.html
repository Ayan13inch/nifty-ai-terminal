<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N50 NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0b0f;
      --card: rgba(255,255,255,0.06);
      --accent: #00f0ff;
      --green: #00ff9d;
      --red: #ff3b5c;
    }
    body {
      background: var(--bg);
      color: #f0f4ff;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .glass {
      background: var(--card);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0,240,255,0.2);
      border-radius: 20px;
    }

    header {
      padding: 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10,11,15,0.95);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -1px;
    }

    .section { padding: 24px 16px; }
    .title {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .top5-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .stock-card {
      padding: 20px;
      border-radius: 18px;
      transition: 0.3s;
    }
    .stock-card:hover { transform: translateY(-6px); }

    .portfolio-engine {
      text-align: center;
      padding: 32px 20px;
    }
    .budget-input {
      font-size: 36px;
      font-weight: 500;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--accent);
      color: white;
      text-align: center;
      width: 100%;
      max-width: 320px;
      outline: none;
    }

    .analyze-btn {
      margin-top: 24px;
      padding: 16px 40px;
      background: linear-gradient(90deg, #00ff9d, #00d4ff);
      color: black;
      font-weight: 600;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
    }

    .portfolio-section {
      display: none;
      padding: 20px 16px;
    }
    .portfolio-section.visible { display: block; }

    .port-row {
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 10px;
      text-align: left;
    }
    th { color: var(--accent); font-size: 13px; }

    footer {
      text-align: center;
      padding: 30px 16px;
      color: #64748b;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">N50 NEXUS</div>
  <div style="color:#00ff9d; font-weight:500;">● LIVE</div>
</header>

<div class="section">
  <div class="title">Top Signals</div>
  <div class="top5-grid" id="top5Grid"></div>
</div>

<div class="section portfolio-engine glass">
  <div class="title">Portfolio Engine</div>
  <input type="number" id="budgetInput" class="budget-input" placeholder="Enter Amount">
  <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">
    ANALYZE & BUILD PORTFOLIO
  </button>
</div>

<!-- Portfolio Results -->
<div class="portfolio-section glass" id="portfolioSection">
  <div class="title">Recommended Portfolio</div>
  <div id="portSummary" style="margin:20px 0; font-size:15px;"></div>
  <div id="portfolioRows"></div>
</div>

<div class="section">
  <div class="title">Live Market Scan</div>
  <div class="glass" style="overflow-x:auto; padding:4px;">
    <table id="stocksTable">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Price</th>
          <th>Change</th>
          <th>Score</th>
          <th>Signal</th>
        </tr>
      </thead>
      <tbody id="stocksTbody"></tbody>
    </table>
  </div>
</div>

<footer>
  Educational Purposes Only • Not Financial Advice<br><br>
  Created by <strong>Ayan Bhowmick</strong><br>
  <a href="mailto:ayaandeep9051@gmail.com" style="color:var(--accent)">ayaandeep9051@gmail.com</a>
</footer>

<script src="app.js"></script>
</body>
</html>
