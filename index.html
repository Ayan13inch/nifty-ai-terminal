<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N50 NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg: #05070f;
      --card: rgba(15,20,40,0.95);
      --accent: #00ffff;
      --green: #39ff14;
      --red: #ff0088;
    }
    body {
      background: var(--bg);
      color: #c8ffdd;
      font-family: 'Share Tech Mono', monospace;
      margin: 0;
    }

    header {
      background: linear-gradient(to right, #0a0f1f, #1a0033);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--accent);
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      color: var(--accent);
      text-shadow: 0 0 15px var(--accent);
    }

    .section { padding: 25px 20px; }
    .title { 
      color: var(--accent); 
      font-size: 17px; 
      margin-bottom: 15px;
      text-shadow: 0 0 10px var(--accent);
    }

    .top5-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .stock-card {
      background: var(--card);
      padding: 18px;
      border-radius: 12px;
      border: 1px solid rgba(0,255,255,0.3);
      transition: 0.3s;
    }
    .stock-card:hover { transform: translateY(-8px); border-color: var(--green); }

    .portfolio-engine {
      background: var(--card);
      padding: 30px 20px;
      text-align: center;
      border-radius: 16px;
      margin: 20px;
      border: 2px solid var(--accent);
    }
    .budget-input {
      font-size: 42px;
      background: transparent;
      border: none;
      border-bottom: 3px solid var(--accent);
      color: white;
      text-align: center;
      width: 100%;
      max-width: 340px;
    }

    .analyze-btn {
      margin-top: 20px;
      padding: 15px 40px;
      background: linear-gradient(#39ff14, #00ffff);
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }

    .sparkline-container { height: 50px; margin: 8px 0; }

    footer {
      text-align: center;
      padding: 30px;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">N50 NEXUS</div>
  <div style="color:#39ff14; font-size:18px; font-weight:bold;">● LIVE MARKET</div>
</header>

<div class="section">
  <div class="title">TOP SIGNALS</div>
  <div class="top5-grid" id="top5Grid"></div>
</div>

<div class="section portfolio-engine">
  <div class="title">PORTFOLIO ENGINE</div>
  <input type="number" id="budgetInput" class="budget-input" placeholder="ENTER AMOUNT">
  <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">ANALYZE & BUILD PORTFOLIO</button>
</div>

<div class="portfolio-section section" id="portfolioSection" style="display:none; background:var(--card); border-radius:16px; padding:25px;">
  <div class="title">RECOMMENDED PORTFOLIO</div>
  <div id="portSummary" style="margin:15px 0; font-size:17px;"></div>
  <div id="portfolioRows"></div>
</div>

<div class="section">
  <div class="title">LIVE MARKET SCAN</div>
  <div style="overflow-x:auto; background:var(--card); padding:10px; border-radius:12px;">
    <table style="width:100%; border-collapse:collapse;" id="stocksTable">
      <thead>
        <tr style="background:#0a0f20;">
          <th>Symbol</th>
          <th>Price</th>
          <th>Change</th>
          <th>Score</th>
          <th>Signal</th>
          <th>Trend</th>
        </tr>
      </thead>
      <tbody id="stocksTbody"></tbody>
    </table>
  </div>
</div>

<footer>
  Educational Purposes Only • Not Financial Advice<br><br>
  Created by <strong>Ayan Bhowmick</strong><br>
  <a href="mailto:ayandeep9051@gmail.com" style="color:var(--accent)">ayandeep9051@gmail.com</a>
</footer>

<script src="app.js"></script>
</body>
</html>
