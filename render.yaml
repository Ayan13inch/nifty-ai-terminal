services:
  - type: web
    name: n50-nexus-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: n50-nexus-frontend-ui          # ← Updated name
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: "*.js"
        name: Content-Type
        value: text/javascript
      - path: "*.css"
        name: Content-Type
        value: text/css